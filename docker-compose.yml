version: "3.8"

services:
  desaine-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desaine_production
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
