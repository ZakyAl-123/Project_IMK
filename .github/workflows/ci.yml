name: DESAINE CI/CD Production Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  static-analysis:
    name: Code Quality & Type Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Static Type Checking
        run: npm run lint

  production-build:
    name: Production Compilation Test
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Client & Backend
        run: npm run build

  docker-image-test:
    name: Docker Containerization Build Test
    runs-on: ubuntu-latest
    needs: production-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Docker Compilation
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: desaine-app:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
